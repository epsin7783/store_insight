<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoreInsight — 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">
    <!-- 로고 영역 -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500 bg-opacity-20 border border-blue-400 border-opacity-30 mb-4">
        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">StoreInsight</h1>
      <p class="text-slate-400 text-sm mt-1">로컬 AI 기반 매장 경영 분석 플랫폼</p>
    </div>

    <!-- 로그인 카드 -->
    <div class="bg-slate-800 bg-opacity-80 backdrop-blur rounded-2xl border border-slate-700 p-8 shadow-2xl">
      <h2 class="text-lg font-semibold text-white mb-6">계정 로그인</h2>

      {% if form.errors %}
      <div class="mb-4 p-3 rounded-lg bg-red-500 bg-opacity-20 border border-red-500 border-opacity-40 text-red-300 text-sm">
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>
      {% endif %}

      {% if messages %}
      {% for message in messages %}
      <div class="mb-4 p-3 rounded-lg bg-yellow-500 bg-opacity-20 border border-yellow-500 border-opacity-40 text-yellow-300 text-sm">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="mb-4">
          <label class="block text-sm font-medium text-slate-300 mb-2">아이디</label>
          <input type="text" name="username" autocomplete="username" required
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-xl text-white placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="사용자 아이디 입력">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-300 mb-2">비밀번호</label>
          <input type="password" name="password" autocomplete="current-password" required
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-xl text-white placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="비밀번호 입력">
        </div>

        <button type="submit"
          class="w-full py-3 px-6 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-xl
                 transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-400">
          로그인
        </button>
      </form>
    </div>

    <!-- 회원가입 링크 -->
    <p class="text-center text-slate-400 text-sm mt-6">
      아직 계정이 없으신가요?
      <a href="{% url 'register' %}" class="text-blue-400 hover:text-blue-300 font-medium transition ml-1">
        회원가입
      </a>
    </p>

    <p class="text-center mt-3">
      <a href="{% url 'home' %}" class="text-slate-500 hover:text-slate-400 text-xs transition">
        ← 홈으로 돌아가기
      </a>
    </p>

    <p class="text-center text-slate-600 text-xs mt-6">
      © 2025 StoreInsight — 오프라인 매장 경영 AI 분석 솔루션
    </p>
  </div>

</body>
</html>
